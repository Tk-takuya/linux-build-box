name: build-cutter

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v5

      - name: Show runner info
        run: |
          uname -a
          lsb_release -a || cat /etc/os-release

      - name: Clone Cutter source
        run: |
          git clone --recursive https://github.com/rizinorg/cutter.git cutter-src

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            meson \
            ninja-build \
            pkgconf \
            git \
            libzip-dev \
            zlib1g-dev \
            qt6-base-dev \
            qt6-tools-dev \
            qt6-tools-dev-tools \
            libqt6svg6-dev \
            libqt6core5compat6-dev \
            libqt6svgwidgets6 \
            qt6-l10n-tools \
            libgraphviz-dev

      - name: Show toolchain versions
        run: |
          cc --version | head -n 1
          cmake --version | head -n 1
          meson --version
          ninja --version
          pkgconf --version
          git --version

      - name: Configure Cutter
        working-directory: cutter-src
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$PWD/out"

      - name: Build Cutter
        working-directory: cutter-src
        run: |
          cmake --build build -j"$(nproc)"

      - name: Install Cutter
        working-directory: cutter-src
        run: |
          cmake --install build

      - name: Prepare bundle directory
        working-directory: cutter-src
        run: |
          rm -rf bundle
          mkdir -p bundle
          cp -a out/. bundle/
          find bundle -maxdepth 4 -type f | sort | sed -n '1,300p'

      - name: Locate Cutter binary
        working-directory: cutter-src
        run: |
          if [ -x bundle/bin/cutter ]; then
            echo "CUTTER_BIN=bundle/bin/cutter" >> "$GITHUB_ENV"
          elif [ -x bundle/bin/Cutter ]; then
            echo "CUTTER_BIN=bundle/bin/Cutter" >> "$GITHUB_ENV"
          else
            echo "Cutter binary not found in bundle/bin"
            ls -la bundle/bin || true
            exit 1
          fi

      - name: Smoke test Rizin side
        working-directory: cutter-src
        run: |
          bundle/bin/rizin -v
          bundle/bin/rz-bin -v
          bundle/bin/rz-asm -v
          bundle/bin/rz-diff -v
          bundle/bin/rz-ax -v

      - name: Inspect Cutter binary
        working-directory: cutter-src
        run: |
          echo "Using: $CUTTER_BIN"
          file "$CUTTER_BIN"
          ldd "$CUTTER_BIN" | tee cutter_ldd.log
          echo "---- not found only ----"
          ldd "$CUTTER_BIN" | grep "not found" || true

      - name: Inspect Rizin libs in bundle
        working-directory: cutter-src
        run: |
          find bundle/lib -maxdepth 3 -type f | sort | sed -n '1,300p' || true

      - name: Prepare quick run wrapper
        working-directory: cutter-src
        run: |
          cat > bundle/run-cutter.sh << 'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          HERE="$(cd "$(dirname "$0")" && pwd)"
          export LD_LIBRARY_PATH="$HERE/lib${LD_LIBRARY_PATH+:$LD_LIBRARY_PATH}"
          exec "$HERE/bin/cutter" "$@"
          EOF
          chmod +x bundle/run-cutter.sh

      - name: Pack bundle
        working-directory: cutter-src
        run: |
          cd bundle
          zip -r ../cutter_linux_x86_64_bundle.zip .

      - name: Upload artifact bundle dir
        uses: actions/upload-artifact@v6
        with:
          name: cutter_linux_x86_64_bundle_dir
          path: cutter-src/bundle
          if-no-files-found: error

      - name: Upload artifact zip
        uses: actions/upload-artifact@v6
        with:
          name: cutter_linux_x86_64_bundle_zip
          path: cutter-src/cutter_linux_x86_64_bundle.zip
          if-no-files-found: error
