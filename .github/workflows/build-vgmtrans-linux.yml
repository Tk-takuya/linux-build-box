name: build-vgmtrans-linux-cli

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v6

      - name: Clone VGMTrans
        run: |
          set -euxo pipefail
          git clone --recursive https://github.com/vgmtrans/vgmtrans.git vgmtrans-src

      - name: Sanity check source tree
        working-directory: vgmtrans-src
        run: |
          set -euxo pipefail
          echo "PWD=$(pwd)"
          ls -la
          test -f CMakePresets.json
          git submodule status

      - name: Install dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            file

      - name: Show tool versions
        run: |
          set -euxo pipefail
          cmake --version
          ninja --version
          g++ --version

      - name: Configure (CLI/Shell only)
        working-directory: vgmtrans-src
        run: |
          set -euxo pipefail
          test -f CMakePresets.json
          cmake --preset linux-x64 \
            -DENABLE_UI_QT=OFF \
            -DENABLE_CLI=ON \
            -DENABLE_SHELL=ON \
            -DINSTALL_SHELL=ON \
            -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/out"

      - name: Build
        working-directory: vgmtrans-src
        run: |
          set -euxo pipefail
          cmake --build --preset linux-x64-release -j"$(nproc)"

      - name: Install what can be installed
        working-directory: vgmtrans-src
        run: |
          set -euxo pipefail
          cmake --install build/linux-x64 --config Release --prefix "$GITHUB_WORKSPACE/out" || true

      - name: Stage CLI and shell binaries
        working-directory: vgmtrans-src
        run: |
          set -euxo pipefail
          mkdir -p "$GITHUB_WORKSPACE/out/bin"
          test -f build/linux-x64/Release/bin/vgmtrans-cli
          cp -fv build/linux-x64/Release/bin/vgmtrans-cli "$GITHUB_WORKSPACE/out/bin/"
          if [ -f build/linux-x64/Release/bin/vgmtrans-shell ]; then
            cp -fv build/linux-x64/Release/bin/vgmtrans-shell "$GITHUB_WORKSPACE/out/bin/"
          fi

      - name: Inspect outputs
        run: |
          set -euxo pipefail
          find "$GITHUB_WORKSPACE/out" -maxdepth 5 -type f | sort
          file "$GITHUB_WORKSPACE"/out/bin/*

      - name: Verify CLI
        run: |
          set -euxo pipefail
          test -f "$GITHUB_WORKSPACE/out/bin/vgmtrans-cli"
          "$GITHUB_WORKSPACE/out/bin/vgmtrans-cli" --help || true
          ldd "$GITHUB_WORKSPACE/out/bin/vgmtrans-cli" || true

      - name: Verify shell presence
        run: |
          set -euxo pipefail
          if [ -f "$GITHUB_WORKSPACE/out/bin/vgmtrans-shell" ]; then
            file "$GITHUB_WORKSPACE/out/bin/vgmtrans-shell"
            ldd "$GITHUB_WORKSPACE/out/bin/vgmtrans-shell" || true
          fi

      - name: Package tarball
        run: |
          set -euxo pipefail
          tar -C "$GITHUB_WORKSPACE/out" -czf vgmtrans_linux_x86_64_cli_bundle.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: vgmtrans_linux_x86_64_cli_bundle
          path: vgmtrans_linux_x86_64_cli_bundle.tar.gz
          if-no-files-found: error
          compression-level: 0
