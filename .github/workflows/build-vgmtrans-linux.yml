name: build-vgmtrans-linux-gui-selfcontained

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 150

    env:
      QT_VERSION: 6.9.3
      QT_OUTPUT_DIR: ${{ github.workspace }}/qt
      QT_HOST: linux
      QT_TARGET: desktop

    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v6

      - name: Prepare log placeholders
        run: |
          set -euxo pipefail
          : > "$GITHUB_WORKSPACE/step_status.log"
          : > "$GITHUB_WORKSPACE/aqt_arch_list.txt"
          : > "$GITHUB_WORKSPACE/icu73_install.log"
          : > "$GITHUB_WORKSPACE/aqt_install.log"
          : > "$GITHUB_WORKSPACE/qt_path.log"
          : > "$GITHUB_WORKSPACE/qsb_verify.log"
          : > "$GITHUB_WORKSPACE/configure.log"
          : > "$GITHUB_WORKSPACE/build_full.log"
          : > "$GITHUB_WORKSPACE/build_tail_200.txt"
          : > "$GITHUB_WORKSPACE/build_tail_60.txt"
          : > "$GITHUB_WORKSPACE/smoke_test.log"
          : > "$GITHUB_WORKSPACE/bundle_layout.log"
          : > "$GITHUB_WORKSPACE/bundle_ldd.log"

      - name: Clone VGMTrans
        run: |
          set -euxo pipefail
          echo "Clone VGMTrans: start" >> "$GITHUB_WORKSPACE/step_status.log"
          git clone --recursive https://github.com/vgmtrans/vgmtrans.git vgmtrans-src
          echo "Clone VGMTrans: done" >> "$GITHUB_WORKSPACE/step_status.log"

      - name: Sanity check source tree
        working-directory: vgmtrans-src
        run: |
          set -euxo pipefail
          echo "Sanity check source tree: start" >> "$GITHUB_WORKSPACE/step_status.log"
          echo "PWD=$(pwd)"
          ls -la
          test -f CMakePresets.json
          git submodule status
          echo "Sanity check source tree: done" >> "$GITHUB_WORKSPACE/step_status.log"

      - name: Install host dependencies
        run: |
          set -euxo pipefail
          echo "Install host dependencies: start" >> "$GITHUB_WORKSPACE/step_status.log"
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            python3 \
            python3-pip \
            file \
            xvfb \
            xauth \
            curl \
            libgl1-mesa-dev \
            libfontconfig1-dev \
            libfreetype-dev \
            libgtk-3-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb-cursor0 \
            libxcb-glx0-dev \
            libxcb-icccm4-dev \
            libxcb-image0-dev \
            libxcb-keysyms1-dev \
            libxcb-randr0-dev \
            libxcb-render-util0-dev \
            libxcb-shape0-dev \
            libxcb-shm0-dev \
            libxcb-sync-dev \
            libxcb-util-dev \
            libxcb-xfixes0-dev \
            libxcb-xkb-dev \
            libxcb1-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxrender-dev
          echo "Install host dependencies: done" >> "$GITHUB_WORKSPACE/step_status.log"

      - name: Install aqtinstall
        run: |
          set -euxo pipefail
          echo "Install aqtinstall: start" >> "$GITHUB_WORKSPACE/step_status.log"
          python3 -m pip install --upgrade pip
          python3 -m pip install --upgrade aqtinstall
          echo "Install aqtinstall: done" >> "$GITHUB_WORKSPACE/step_status.log"

      - name: Check available Qt architectures
        run: |
          set -euxo pipefail
          echo "Check available Qt architectures: start" >> "$GITHUB_WORKSPACE/step_status.log"
          python3 -m aqt list-qt "$QT_HOST" "$QT_TARGET" --arch "$QT_VERSION" | tee "$GITHUB_WORKSPACE/aqt_arch_list.txt"
          echo "Check available Qt architectures: done" >> "$GITHUB_WORKSPACE/step_status.log"

      - name: Select Qt architecture
        run: |
          set -euxo pipefail
          echo "Select Qt architecture: start" >> "$GITHUB_WORKSPACE/step_status.log"
          AQT_ARCH="$(tr ' ' '\n' < "$GITHUB_WORKSPACE/aqt_arch_list.txt" | grep -E '^(gcc_64|linux_gcc_64)$' | head -n 1)"
          test -n "$AQT_ARCH"
          echo "AQT_ARCH=$AQT_ARCH" >> "$GITHUB_ENV"
          echo "Selected AQT_ARCH=$AQT_ARCH"
          echo "Select Qt architecture: done" >> "$GITHUB_WORKSPACE/step_status.log"

      - name: Install ICU 73 compatibility runtime
        run: |
          set -o pipefail
          echo "Install ICU 73 compatibility runtime: start" >> "$GITHUB_WORKSPACE/step_status.log"

          WORKROOT="$RUNNER_TEMP/icu73-apt"
          mkdir -p "$WORKROOT/state/lists/partial" "$WORKROOT/cache/archives/partial"

          cat > "$WORKROOT/snapshot.list" <<'EOF'
          deb [trusted=yes check-valid-until=no] https://snapshot.debian.org/archive/debian/20230329T000000Z/ experimental main
          EOF

          {
            echo "=== snapshot sources ==="
            cat "$WORKROOT/snapshot.list"
            echo "=== apt update ==="
            apt-get \
              -o Dir::State="$WORKROOT/state" \
              -o Dir::Cache="$WORKROOT/cache" \
              -o Dir::Etc::sourcelist="$WORKROOT/snapshot.list" \
              -o Dir::Etc::sourceparts="-" \
              update

            echo "=== apt download libicu73 ==="
            cd "$WORKROOT"
            apt-get \
              -o Dir::State="$WORKROOT/state" \
              -o Dir::Cache="$WORKROOT/cache" \
              -o Dir::Etc::sourcelist="$WORKROOT/snapshot.list" \
              -o Dir::Etc::sourceparts="-" \
              download libicu73=73.1~rc-1

            DEB_PATH="$(find "$WORKROOT" -maxdepth 1 -type f -name 'libicu73_73.1~rc-1_*.deb' | head -n 1)"
            test -n "$DEB_PATH"
            file "$DEB_PATH"

            mkdir -p "$GITHUB_WORKSPACE/icu73"
            dpkg-deb -x "$DEB_PATH" "$GITHUB_WORKSPACE/icu73"

            ICU73_LIBDIR="$GITHUB_WORKSPACE/icu73/usr/lib/x86_64-linux-gnu"
            test -f "$ICU73_LIBDIR/libicui18n.so.73"
            test -f "$ICU73_LIBDIR/libicuuc.so.73"
            test -f "$ICU73_LIBDIR/libicudata.so.73"

            echo "ICU73_LIBDIR=$ICU73_LIBDIR" >> "$GITHUB_ENV"
            if [ -n "${LD_LIBRARY_PATH:-}" ]; then
              echo "LD_LIBRARY_PATH=$ICU73_LIBDIR:$LD_LIBRARY_PATH" >> "$GITHUB_ENV"
            else
              echo "LD_LIBRARY_PATH=$ICU73_LIBDIR" >> "$GITHUB_ENV"
            fi
          } 2>&1 | tee "$GITHUB_WORKSPACE/icu73_install.log"

          echo "Install ICU 73 compatibility runtime: done" >> "$GITHUB_WORKSPACE/step_status.log"

      - name: Install Qt with aqtinstall
        run: |
          set -o pipefail
          echo "Install Qt with aqtinstall: start" >> "$GITHUB_WORKSPACE/step_status.log"
          mkdir -p "$QT_OUTPUT_DIR"
          export LD_LIBRARY_PATH="$ICU73_LIBDIR${LD_LIBRARY_PATH+:$LD_LIBRARY_PATH}"
          python3 -m aqt install-qt \
            -O "$QT_OUTPUT_DIR" \
            "$QT_HOST" \
            "$QT_TARGET" \
            "$QT_VERSION" \
            "$AQT_ARCH" \
            -m qtshadertools \
            --archives qtbase qtsvg \
            2>&1 | tee "$GITHUB_WORKSPACE/aqt_install.log"
          echo "Install Qt with aqtinstall: done" >> "$GITHUB_WORKSPACE/step_status.log"

      - name: Define Qt paths
        run: |
          set -o pipefail
          echo "Define Qt paths: start" >> "$GITHUB_WORKSPACE/step_status.log"
          QT_ROOT="$(find "$QT_OUTPUT_DIR/$QT_VERSION" -mindepth 1 -maxdepth 4 -type d -path '*/lib/cmake/Qt6' | sed 's#/lib/cmake/Qt6##' | sort | head -n 1)"
          test -n "$QT_ROOT"
          test -d "$QT_ROOT"
          test -d "$QT_ROOT/lib/cmake/Qt6"
          echo "QT_ROOT=$QT_ROOT" >> "$GITHUB_ENV"
          echo "CMAKE_PREFIX_PATH=$QT_ROOT" >> "$GITHUB_ENV"
          {
            echo "Resolved QT_ROOT=$QT_ROOT"
            find "$QT_ROOT" -maxdepth 3 -type d | sort | sed -n '1,160p'
          } 2>&1 | tee "$GITHUB_WORKSPACE/qt_path.log"
          echo "Define Qt paths: done" >> "$GITHUB_WORKSPACE/step_status.log"

      - name: Verify qsb runtime
        run: |
          set -o pipefail
          echo "Verify qsb runtime: start" >> "$GITHUB_WORKSPACE/step_status.log"
          export LD_LIBRARY_PATH="$ICU73_LIBDIR:$QT_ROOT/lib${LD_LIBRARY_PATH+:$LD_LIBRARY_PATH}"
          {
            test -f "$QT_ROOT/bin/qsb"
            ldd "$QT_ROOT/bin/qsb" || true
            "$QT_ROOT/bin/qsb" --help >/dev/null
            echo "qsb runtime OK"
          } 2>&1 | tee "$GITHUB_WORKSPACE/qsb_verify.log"
          echo "Verify qsb runtime: done" >> "$GITHUB_WORKSPACE/step_status.log"

      - name: Show tool versions
        run: |
          set -euxo pipefail
          echo "Show tool versions: start" >> "$GITHUB_WORKSPACE/step_status.log"
          cmake --version
          ninja --version
          g++ --version
          python3 -m aqt version
          test -d "$QT_ROOT/lib/cmake/Qt6"
          echo "Show tool versions: done" >> "$GITHUB_WORKSPACE/step_status.log"

      - name: Configure
        working-directory: vgmtrans-src
        run: |
          set -o pipefail
          echo "Configure: start" >> "$GITHUB_WORKSPACE/step_status.log"
          export LD_LIBRARY_PATH="$ICU73_LIBDIR:$QT_ROOT/lib${LD_LIBRARY_PATH+:$LD_LIBRARY_PATH}"
          test -f CMakePresets.json
          cmake --preset linux-x64 \
            -DENABLE_UI_QT=ON \
            -DENABLE_CLI=ON \
            -DENABLE_SHELL=ON \
            -DINSTALL_SHELL=ON \
            -DNO_QT_DEPLOY=ON \
            -DCMAKE_PREFIX_PATH="$QT_ROOT" \
            -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/out" \
            2>&1 | tee "$GITHUB_WORKSPACE/configure.log"
          echo "Configure: done" >> "$GITHUB_WORKSPACE/step_status.log"

      - name: Build
        working-directory: vgmtrans-src
        run: |
          set -o pipefail
          echo "Build: start" >> "$GITHUB_WORKSPACE/step_status.log"
          export LD_LIBRARY_PATH="$ICU73_LIBDIR:$QT_ROOT/lib${LD_LIBRARY_PATH+:$LD_LIBRARY_PATH}"
          cmake --build --preset linux-x64-release -j"$(nproc)" --verbose 2>&1 | tee "$GITHUB_WORKSPACE/build_full.log"
          echo "Build: done" >> "$GITHUB_WORKSPACE/step_status.log"

      - name: Extract build log tail
        if: always()
        run: |
          set -euxo pipefail
          tail -n 200 "$GITHUB_WORKSPACE/build_full.log" > "$GITHUB_WORKSPACE/build_tail_200.txt" || true
          tail -n 60 "$GITHUB_WORKSPACE/build_full.log" > "$GITHUB_WORKSPACE/build_tail_60.txt" || true
          sed -n '1,120p' "$GITHUB_WORKSPACE/build_tail_60.txt" || true

      - name: Install bundle
        if: success()
        working-directory: vgmtrans-src
        run: |
          set -euxo pipefail
          export LD_LIBRARY_PATH="$ICU73_LIBDIR:$QT_ROOT/lib${LD_LIBRARY_PATH+:$LD_LIBRARY_PATH}"
          mkdir -p "$GITHUB_WORKSPACE/out/bin"
          cmake --install build/linux-x64 --config Release --prefix "$GITHUB_WORKSPACE/out" || true

      - name: Locate built binaries
        if: success()
        working-directory: vgmtrans-src
        run: |
          set -euxo pipefail
          find build/linux-x64 -type f \( -name 'vgmtrans' -o -name 'vgmtrans-cli' -o -name 'vgmtrans-shell' \) | sort || true

      - name: Stage binaries from build tree if missing
        if: success()
        working-directory: vgmtrans-src
        run: |
          set -euxo pipefail
          mkdir -p "$GITHUB_WORKSPACE/out/bin"

          if [ ! -f "$GITHUB_WORKSPACE/out/bin/vgmtrans" ]; then
            GUI_PATH="$(find build/linux-x64 -type f -name 'vgmtrans' | sort | head -n 1 || true)"
            test -n "$GUI_PATH"
            cp -fv "$GUI_PATH" "$GITHUB_WORKSPACE/out/bin/vgmtrans"
          fi

          if [ ! -f "$GITHUB_WORKSPACE/out/bin/vgmtrans-cli" ]; then
            CLI_PATH="$(find build/linux-x64 -type f -name 'vgmtrans-cli' | sort | head -n 1 || true)"
            if [ -n "$CLI_PATH" ]; then
              cp -fv "$CLI_PATH" "$GITHUB_WORKSPACE/out/bin/vgmtrans-cli"
            fi
          fi

          if [ ! -f "$GITHUB_WORKSPACE/out/bin/vgmtrans-shell" ]; then
            SHELL_PATH="$(find build/linux-x64 -type f -name 'vgmtrans-shell' | sort | head -n 1 || true)"
            if [ -n "$SHELL_PATH" ]; then
              cp -fv "$SHELL_PATH" "$GITHUB_WORKSPACE/out/bin/vgmtrans-shell"
            fi
          fi

      - name: Assemble self-contained bundle
        if: success()
        run: |
          set -euxo pipefail
          echo "Assemble self-contained bundle: start" >> "$GITHUB_WORKSPACE/step_status.log"

          BUNDLE_ROOT="$GITHUB_WORKSPACE/vgmtrans_linux_x86_64_gui_selfcontained_bundle"
          rm -rf "$BUNDLE_ROOT"
          mkdir -p "$BUNDLE_ROOT/bin" "$BUNDLE_ROOT/lib"

          cp -a "$GITHUB_WORKSPACE/out/bin/." "$BUNDLE_ROOT/bin/"
          if [ -d "$GITHUB_WORKSPACE/out/lib" ]; then
            mkdir -p "$BUNDLE_ROOT/lib"
            cp -a "$GITHUB_WORKSPACE/out/lib/." "$BUNDLE_ROOT/lib/"
          fi
          if [ -d "$GITHUB_WORKSPACE/out/share" ]; then
            mkdir -p "$BUNDLE_ROOT/share"
            cp -a "$GITHUB_WORKSPACE/out/share/." "$BUNDLE_ROOT/share/"
          fi

          cp -a "$QT_ROOT/plugins" "$BUNDLE_ROOT/"

          cp -Lv "$ICU73_LIBDIR"/libicu*.so.73 "$BUNDLE_ROOT/lib/"
          cp -Lv "$QT_ROOT"/lib/libQt6*.so* "$BUNDLE_ROOT/lib/" || true
          cp -Lv "$QT_ROOT"/lib/libicui18n.so* "$BUNDLE_ROOT/lib/" || true
          cp -Lv "$QT_ROOT"/lib/libicuuc.so* "$BUNDLE_ROOT/lib/" || true
          cp -Lv "$QT_ROOT"/lib/libicudata.so* "$BUNDLE_ROOT/lib/" || true

          if [ -d "$GITHUB_WORKSPACE/vgmtrans-src/lib/bass" ]; then
            cp -Lv "$GITHUB_WORKSPACE/vgmtrans-src/lib/bass"/libbass*.so "$BUNDLE_ROOT/lib/" || true
          fi

          for pass in 1 2 3 4 5; do
            : > "$RUNNER_TEMP/deps.list"
            while IFS= read -r f; do
              ldd "$f" 2>/dev/null | awk '
                /=> \// {print $3}
                /^\/[^ ]+/ {print $1}
              ' >> "$RUNNER_TEMP/deps.list" || true
            done < <(find "$BUNDLE_ROOT/bin" "$BUNDLE_ROOT/lib" "$BUNDLE_ROOT/plugins" -type f \( -perm -111 -o -name '*.so' -o -name '*.so.*' \) | sort)

            sort -u "$RUNNER_TEMP/deps.list" | while IFS= read -r lib; do
              [ -f "$lib" ] || continue
              base="$(basename "$lib")"
              case "$base" in
                ld-linux*|libc.so*|libm.so*|libpthread.so*|librt.so*|libdl.so*|libresolv.so*|libutil.so*|libnsl.so*|libanl.so*)
                  continue
                  ;;
              esac
              dest="$BUNDLE_ROOT/lib/$base"
              if [ ! -e "$dest" ]; then
                cp -Lv "$lib" "$dest"
              fi
            done
          done

          cat > "$BUNDLE_ROOT/run-vgmtrans.sh" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          HERE="$(cd "$(dirname "$0")" && pwd)"
          export LD_LIBRARY_PATH="$HERE/lib${LD_LIBRARY_PATH+:$LD_LIBRARY_PATH}"
          export QT_PLUGIN_PATH="$HERE/plugins"
          export QT_QPA_PLATFORM_PLUGIN_PATH="$HERE/plugins/platforms"
          export QT_QPA_PLATFORM="${QT_QPA_PLATFORM:-xcb}"
          exec "$HERE/bin/vgmtrans" "$@"
          EOF
          chmod +x "$BUNDLE_ROOT/run-vgmtrans.sh"

          cat > "$BUNDLE_ROOT/run-vgmtrans-cli.sh" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          HERE="$(cd "$(dirname "$0")" && pwd)"
          export LD_LIBRARY_PATH="$HERE/lib${LD_LIBRARY_PATH+:$LD_LIBRARY_PATH}"
          exec "$HERE/bin/vgmtrans-cli" "$@"
          EOF
          chmod +x "$BUNDLE_ROOT/run-vgmtrans-cli.sh"

          cat > "$BUNDLE_ROOT/run-vgmtrans-shell.sh" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          HERE="$(cd "$(dirname "$0")" && pwd)"
          export LD_LIBRARY_PATH="$HERE/lib${LD_LIBRARY_PATH+:$LD_LIBRARY_PATH}"
          exec "$HERE/bin/vgmtrans-shell" "$@"
          EOF
          chmod +x "$BUNDLE_ROOT/run-vgmtrans-shell.sh"

          {
            echo "=== bundle tree ==="
            find "$BUNDLE_ROOT" -maxdepth 4 | sort
          } 2>&1 | tee "$GITHUB_WORKSPACE/bundle_layout.log"

          {
            echo "=== ldd: bundled gui ==="
            ldd "$BUNDLE_ROOT/bin/vgmtrans" || true
            echo "=== ldd: wrapper target libs ==="
            ldd "$BUNDLE_ROOT/plugins/platforms/"*.so || true
          } 2>&1 | tee "$GITHUB_WORKSPACE/bundle_ldd.log"

          echo "BUNDLE_ROOT=$BUNDLE_ROOT" >> "$GITHUB_ENV"
          echo "Assemble self-contained bundle: done" >> "$GITHUB_WORKSPACE/step_status.log"

      - name: Smoke test self-contained GUI bundle
        if: success()
        run: |
          set -o pipefail
          echo "Smoke test GUI: start" >> "$GITHUB_WORKSPACE/step_status.log"

          {
            test -d "$BUNDLE_ROOT"
            test -x "$BUNDLE_ROOT/run-vgmtrans.sh"

            Xvfb :99 -screen 0 1280x720x24 > "$RUNNER_TEMP/xvfb.log" 2>&1 &
            XVFB_PID=$!
            trap 'kill $XVFB_PID || true' EXIT
            sleep 2
            export DISPLAY=:99

            set +e
            timeout 10s "$BUNDLE_ROOT/run-vgmtrans.sh" > "$RUNNER_TEMP/vgmtrans_gui.log" 2>&1
            STATUS=$?
            set -e

            echo "=== xvfb log ==="
            cat "$RUNNER_TEMP/xvfb.log" || true
            echo "=== gui log ==="
            cat "$RUNNER_TEMP/vgmtrans_gui.log" || true
            echo "SMOKE_STATUS=$STATUS"

            if [ "$STATUS" -ne 0 ] && [ "$STATUS" -ne 124 ]; then
              exit "$STATUS"
            fi
          } 2>&1 | tee "$GITHUB_WORKSPACE/smoke_test.log"

          echo "Smoke test GUI: done" >> "$GITHUB_WORKSPACE/step_status.log"

      - name: Package tarball
        if: success()
        run: |
          set -euxo pipefail
          tar -C "$BUNDLE_ROOT" -czf vgmtrans_linux_x86_64_gui_selfcontained_bundle.tar.gz .

      - name: Upload GUI bundle artifact
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: vgmtrans_linux_x86_64_gui_selfcontained_bundle
          path: vgmtrans_linux_x86_64_gui_selfcontained_bundle.tar.gz
          if-no-files-found: error
          compression-level: 0

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: vgmtrans_logs
          path: |
            ${{ github.workspace }}/step_status.log
            ${{ github.workspace }}/aqt_arch_list.txt
            ${{ github.workspace }}/icu73_install.log
            ${{ github.workspace }}/aqt_install.log
            ${{ github.workspace }}/qt_path.log
            ${{ github.workspace }}/qsb_verify.log
            ${{ github.workspace }}/configure.log
            ${{ github.workspace }}/build_full.log
            ${{ github.workspace }}/build_tail_200.txt
            ${{ github.workspace }}/build_tail_60.txt
            ${{ github.workspace }}/smoke_test.log
            ${{ github.workspace }}/bundle_layout.log
            ${{ github.workspace }}/bundle_ldd.log
          if-no-files-found: error
          compression-level: 0
