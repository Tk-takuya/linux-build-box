name: Xenogears All Songs Build

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/xenogears_all_songs_build.yml'
      - 'xenogears/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-batch-export:
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout linux-build-box repo
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build git liblzma-dev python3-pip patch unzip
          python3 -m pip install --upgrade pip
          python3 -m pip install mido

      - name: Clone upstream VGMTrans and submodules
        run: |
          rm -rf work
          mkdir -p work
          git clone https://github.com/vgmtrans/vgmtrans.git work/vgmtrans
          cd work/vgmtrans
          git checkout ce2b641e953589a7b30a40094a38ecdd3278580d
          git submodule update --init --recursive

      - name: Apply Xenogears all-songs patches
        run: |
          cd work/vgmtrans
          patch -p1 < "$GITHUB_WORKSPACE/xenogears/patches/0001-FFTSeq-runtime-seed-bank-policy.patch"
          patch -p1 < "$GITHUB_WORKSPACE/xenogears/patches/0002-FFTColl-bank-remap.patch"
          patch -p1 < "$GITHUB_WORKSPACE/xenogears/patches/0003-FFTMatcher-extra-wds-banks.patch"
          patch -p1 < "$GITHUB_WORKSPACE/xenogears/patches/0004-FFTFormat-wire-custom-matcher-coll.patch"
          patch -p1 < "$GITHUB_WORKSPACE/xenogears/patches/0005-SF2File-eos-terminal-shdr.patch"

      - name: Configure VGMTrans shell build
        run: |
          cd work/vgmtrans
          cmake --preset linux-x64             -DENABLE_UI_QT=OFF             -DENABLE_CLI=OFF             -DENABLE_SHELL=ON

      - name: Build vgmtrans-shell
        run: |
          cd work/vgmtrans
          cmake --build --preset linux-x64-release --target vgmtrans-shell

      - name: Show built files
        run: |
          find "$GITHUB_WORKSPACE/work/vgmtrans/build" -maxdepth 8 -type f | sort

      - name: Batch export all Xenogears PSFs
        run: |
          bash "$GITHUB_WORKSPACE/xenogears/scripts/run_all_songs_export.sh"             "$GITHUB_WORKSPACE/work/vgmtrans"             "$GITHUB_WORKSPACE/xenogears/inputs/XENOGEARS.zip"             "$GITHUB_WORKSPACE/out"

      - name: Summarize all-song results
        run: |
          python3 "$GITHUB_WORKSPACE/xenogears/scripts/summarize_all_songs.py"             "$GITHUB_WORKSPACE/out/results"             "$GITHUB_WORKSPACE/out"

      - name: Collect build metadata
        run: |
          cd work/vgmtrans
          git rev-parse HEAD > "$GITHUB_WORKSPACE/out/upstream_commit.txt"
          git status --short > "$GITHUB_WORKSPACE/out/upstream_git_status.txt"

      - name: Upload Xenogears all-songs artifacts
        uses: actions/upload-artifact@v7
        with:
          name: xenogears-all-songs-build
          path: |
            out/
            work/vgmtrans/build/linux-x64/Release/bin/vgmtrans-shell
            work/vgmtrans/build/linux-x64/src/ui/shell/Release/vgmtrans-shell
            work/vgmtrans/build/linux-x64/Release/vgmtrans-shell
