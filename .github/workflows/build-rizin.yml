name: build-rizin

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v5

      - name: Show runner info
        run: |
          uname -a
          lsb_release -a || cat /etc/os-release

      - name: Clone Rizin source
        run: |
          git clone --recursive https://github.com/rizinorg/rizin.git rizin-src

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            meson \
            ninja-build \
            pkg-config \
            git \
            libssl-dev \
            libzip-dev \
            capstone-tool \
            libcapstone-dev

      - name: Show toolchain versions
        run: |
          cc --version | head -n 1
          meson --version
          ninja --version
          pkg-config --version
          git --version

      - name: Configure Rizin
        working-directory: rizin-src
        run: |
          meson setup build \
            --buildtype=release \
            --prefix="$PWD/out"

      - name: Show configure result
        working-directory: rizin-src
        run: |
          test -d build
          test -f build/build.ninja
          ls -la build | sed -n '1,120p'

      - name: Build Rizin
        working-directory: rizin-src
        run: |
          ninja -C build

      - name: Show built binaries
        working-directory: rizin-src
        run: |
          find build -type f \( -name rizin -o -name rz-bin -o -name rz-asm -o -name rz-diff -o -name rz-ax \) | sort || true
          find build -type f | sed -n '1,200p'
