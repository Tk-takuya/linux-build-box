name: build-rizin

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v5

      - name: Show runner info
        run: |
          uname -a
          lsb_release -a || cat /etc/os-release

      - name: Clone Rizin source
        run: |
          git clone --recursive https://github.com/rizinorg/rizin.git rizin-src

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            meson \
            ninja-build \
            pkg-config \
            git \
            libssl-dev \
            libzip-dev \
            capstone-tool \
            libcapstone-dev

      - name: Show toolchain versions
        run: |
          cc --version | head -n 1
          meson --version
          ninja --version
          pkg-config --version
          git --version

      - name: Configure Rizin
        working-directory: rizin-src
        run: |
          meson setup build \
            --buildtype=release \
            --prefix="$PWD/out"

      - name: Build Rizin
        working-directory: rizin-src
        run: |
          ninja -C build

      - name: Install Rizin
        working-directory: rizin-src
        run: |
          meson install -C build

      - name: Show installed tree
        working-directory: rizin-src
        run: |
          test -d out
          find out -maxdepth 3 -type f | sort | sed -n '1,240p'

      - name: Smoke test installed binaries
        working-directory: rizin-src
        run: |
          test -x out/bin/rizin || test -x out/bin/rizin.exe || true
          out/bin/rizin -v || true
          out/bin/rz-bin -v
          out/bin/rz-asm -v
          out/bin/rz-diff -v
          out/bin/rz-ax -v
