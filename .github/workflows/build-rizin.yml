name: build-rizin

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v5

      - name: Show runner info
        run: |
          uname -a
          lsb_release -a || cat /etc/os-release

      - name: Clone Rizin source
        run: |
          git clone --recursive https://github.com/rizinorg/rizin.git rizin-src

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            meson \
            ninja-build \
            pkg-config \
            git \
            libssl-dev \
            libzip-dev \
            capstone-tool \
            libcapstone-dev

      - name: Show toolchain versions
        run: |
          cc --version | head -n 1
          meson --version
          ninja --version
          pkg-config --version
          git --version
