name: build-rizin

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v5

      - name: Show runner info
        run: |
          uname -a
          lsb_release -a || cat /etc/os-release

      - name: Clone Rizin source
        run: |
          git clone --recursive https://github.com/rizinorg/rizin.git rizin-src

      - name: Show cloned tree
        run: |
          ls -la
          ls -la rizin-src
          find rizin-src -maxdepth 2 -type f | sort | sed -n '1,120p'
