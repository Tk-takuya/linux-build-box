name: Build MAME NEOGEO Linux x86_64

on:
  workflow_dispatch:

jobs:
  build-mame-neogeo:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install packages needed for build
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            python3 \
            libsdl2-dev \
            libsdl2-ttf-dev \
            libfontconfig-dev \
            libpulse-dev \
            qtbase5-dev \
            qtbase5-dev-tools \
            qtchooser \
            qt5-qmake \
            zip \
            file

      - name: Clone official MAME source for 0.287
        run: |
          git clone -b mame0287 --depth 1 https://github.com/mamedev/mame.git mame-src

      - name: Build NEOGEO subset
        run: |
          cd mame-src
          make SUBTARGET=neogeomame SOURCES=src/mame/neogeo/neogeo.cpp REGENIE=1 -j3

      - name: Collect binary and runtime files recursively
        run: |
          mkdir -p mame-out/lib

          BIN_PATH="$(find mame-src -type f \( -name neogeomame -o -name 'neogeomame*' -o -name mame \) | head -n 1)"
          echo "BIN_PATH=$BIN_PATH"
          test -n "$BIN_PATH"

          BIN_NAME="$(basename "$BIN_PATH")"
          cp "$BIN_PATH" "mame-out/$BIN_NAME"
          cp -r mame-src/plugins mame-out/ || true
          cp -r mame-src/hash mame-out/ || true

          mkdir -p workqueue
          cp "mame-out/$BIN_NAME" workqueue/target.bin

          touch processed.txt
          : > queue.txt
          echo "workqueue/target.bin" >> queue.txt

          while read -r current; do
            [ -n "$current" ] || continue
            if grep -Fxq "$current" processed.txt; then
              continue
            fi
            echo "$current" >> processed.txt

            echo "Scanning: $current"
            ldd "$current" | awk '/=> \// {print $3}' | sort -u > deps.txt || true
            cat deps.txt || true

            while read -r dep; do
              [ -n "$dep" ] || continue
              base="$(basename "$dep")"

              case "$base" in
                linux-vdso.so.*|ld-linux*.so*|libc.so.*|libm.so.*|libstdc++.so.*|libgcc_s.so.*|libpthread.so.*|libdl.so.*|librt.so.*)
                  echo "Skipping base system lib: $base"
                  ;;
                *)
                  if [ ! -f "mame-out/lib/$base" ]; then
                    echo "Copying: $dep -> mame-out/lib/$base"
                    cp -Lv "$dep" "mame-out/lib/$base"
                  fi

                  if [ ! -f "workqueue/$base" ]; then
                    cp -f "mame-out/lib/$base" "workqueue/$base"
                    echo "workqueue/$base" >> queue.txt
                  fi
                  ;;
              esac
            done < deps.txt
          done < queue.txt

      - name: Create launcher script
        run: |
          BIN_NAME="$(find mame-out -maxdepth 1 -type f \( -name neogeomame -o -name 'neogeomame*' -o -name mame \) -printf '%f\n' | head -n 1)"
          cat > mame-out/run-mame.sh <<EOF
          #!/usr/bin/env bash
          set -e
          HERE="\$(cd "\$(dirname "\$0")" && pwd)"
          export LD_LIBRARY_PATH="\$HERE/lib\${LD_LIBRARY_PATH:+:\$LD_LIBRARY_PATH}"
          exec "\$HERE/$BIN_NAME" "\$@"
          EOF
          chmod +x mame-out/run-mame.sh

      - name: Show verification info
        run: |
          find mame-out -maxdepth 2 -type f | sort
          file mame-out/* || true
          echo "==== direct ldd on binary ===="
          BIN_PATH="$(find mame-out -maxdepth 1 -type f \( -name neogeomame -o -name 'neogeomame*' -o -name mame \) | head -n 1)"
          ldd "$BIN_PATH" || true
          echo "==== launcher version test ===="
          ./mame-out/run-mame.sh -version || true

      - name: Pack artifact
        run: |
          cd mame-out
          zip -r ../mame_neogeo_linux_x86_64_bundle.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: mame_neogeo_linux_x86_64_bundle
          path: mame_neogeo_linux_x86_64_bundle.zip
