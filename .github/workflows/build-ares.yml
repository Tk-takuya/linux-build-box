name: build-ares

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v5

      - name: Show runner info
        run: |
          uname -a
          lsb_release -a || cat /etc/os-release

      - name: Clone ares source
        run: |
          git clone --recursive https://github.com/ares-emulator/ares.git ares-src

      - name: Inspect source tree
        working-directory: ares-src
        run: |
          echo "==== top level ===="
          ls -la
          echo "==== find makefiles ===="
          find . -maxdepth 4 \( -name Makefile -o -name GNUmakefile -o -name makefile \) | sort
          echo "==== likely project dirs ===="
          find . -maxdepth 3 -type d | sort | sed -n '1,200p'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gcc \
            g++ \
            make \
            pkg-config \
            git \
            zip \
            libgtk-3-dev \
            libgl1-mesa-dev \
            libasound2-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libudev-dev

      - name: Show toolchain versions
        run: |
          cc --version | head -n 1
          c++ --version | head -n 1
          make --version | head -n 1
          pkg-config --version

      - name: Build ares release gtk3
        working-directory: ares-src
        run: |
          set -euo pipefail

          BUILD_DIR=""
          if [ -f desktop-ui/Makefile ]; then
            BUILD_DIR="desktop-ui"
          elif [ -f desktop-ui/GNUmakefile ]; then
            BUILD_DIR="desktop-ui"
          elif [ -f desktop-ui/makefile ]; then
            BUILD_DIR="desktop-ui"
          elif [ -f Makefile ]; then
            BUILD_DIR="."
          elif [ -f GNUmakefile ]; then
            BUILD_DIR="."
          elif [ -f makefile ]; then
            BUILD_DIR="."
          else
            echo "No supported Makefile location found"
            exit 1
          fi

          echo "Using build dir: $BUILD_DIR"
          cd "$BUILD_DIR"

          make build=release hiro=gtk3 -j"$(nproc)"

      - name: Locate built binary
        working-directory: ares-src
        run: |
          echo "==== candidate binaries ===="
          find . -type f | grep -Ei '(^|/)(ares)$' | sort || true

          echo "==== executable files near top ===="
          find . -maxdepth 6 -type f -executable | sort | sed -n '1,240p'

          BIN_CANDIDATE="$(find . -type f -executable | grep -Ei '(^|/)(ares)$' | head -n 1 || true)"
          if [ -z "$BIN_CANDIDATE" ]; then
            BIN_CANDIDATE="$(find . -maxdepth 6 -type f -executable | head -n 1 || true)"
          fi
          if [ -z "$BIN_CANDIDATE" ]; then
            echo "No executable found"
            exit 1
          fi
          echo "ARES_BIN=$BIN_CANDIDATE" >> "$GITHUB_ENV"
          echo "Selected binary: $BIN_CANDIDATE"

      - name: Inspect built binary
        working-directory: ares-src
        run: |
          echo "Using: $ARES_BIN"
          file "$ARES_BIN"
          ldd "$ARES_BIN" | tee ares_ldd_raw.log || true
          echo "---- not found only (raw) ----"
          grep "not found" ares_ldd_raw.log || true

      - name: Prepare portable bundle
        working-directory: ares-src
        run: |
          rm -rf bundle
          mkdir -p bundle/bin
          cp -a "$ARES_BIN" bundle/bin/ares

          if [ -d ares/Shaders ]; then
            mkdir -p bundle/Shaders
            cp -a ares/Shaders/. bundle/Shaders/
          fi

          if [ -d desktop-ui/ares/Shaders ]; then
            mkdir -p bundle/Shaders
            cp -a desktop-ui/ares/Shaders/. bundle/Shaders/ || true
          fi

          if [ -f LICENSE ]; then
            cp -a LICENSE bundle/
          fi

          echo "==== bundle tree ===="
          find bundle -maxdepth 5 -type f | sort | sed -n '1,300p'

      - name: Prepare wrapper
        working-directory: ares-src
        run: |
          cat > bundle/run-ares.sh << 'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          HERE="$(cd "$(dirname "$0")" && pwd)"
          exec "$HERE/bin/ares" "$@"
          EOF
          chmod +x bundle/run-ares.sh

      - name: Smoke test help/version
        working-directory: ares-src
        run: |
          bundle/bin/ares --help | sed -n '1,40p' || true
          bundle/bin/ares --version || true

      - name: Upload artifact bundle dir
        uses: actions/upload-artifact@v6
        with:
          name: ares_linux_x86_64_bundle_dir
          path: ares-src/bundle
          if-no-files-found: error

      - name: Pack bundle zip
        working-directory: ares-src
        run: |
          cd bundle
          zip -r ../ares_linux_x86_64_bundle.zip .

      - name: Upload artifact zip
        uses: actions/upload-artifact@v6
        with:
          name: ares_linux_x86_64_bundle_zip
          path: ares-src/ares_linux_x86_64_bundle.zip
          if-no-files-found: error
