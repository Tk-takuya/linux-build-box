name: build-ares

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v5

      - name: Show runner info
        run: |
          uname -a
          lsb_release -a || cat /etc/os-release

      - name: Clone ares source
        run: |
          git clone --recursive https://github.com/ares-emulator/ares.git ares-src

      - name: Inspect source tree
        working-directory: ares-src
        run: |
          echo "==== top level ===="
          ls -la
          echo "==== key files ===="
          ls -la CMakeLists.txt CMakePresets.json README.md || true
          echo "==== top directories ===="
          find . -maxdepth 2 -type d | sort | sed -n '1,200p'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            curl \
            git \
            zip \
            libgtk-3-dev \
            libcanberra-gtk-module \
            libgl-dev \
            libasound2-dev \
            libao-dev \
            libopenal-dev \
            libpulse-dev \
            libudev-dev

      - name: Show toolchain versions
        run: |
          cc --version | head -n 1
          c++ --version | head -n 1
          cmake --version | head -n 1
          ninja --version
          pkg-config --version

      - name: Configure ares
        working-directory: ares-src
        run: |
          mkdir -p build
          cd build
          cmake .. -G Ninja

      - name: Build ares
        working-directory: ares-src
        run: |
          cd build
          cmake --build . -j"$(nproc)"

      - name: Locate built binary
        working-directory: ares-src
        run: |
          echo "==== likely output tree ===="
          find build -maxdepth 4 -type d | sort | sed -n '1,240p' || true
          echo "==== candidate binaries ===="
          find build -type f | grep -Ei '(^|/)(ares|sourcery)$' | sort || true
          echo "==== executable files ===="
          find build -maxdepth 6 -type f -executable | sort | sed -n '1,240p'

          BIN_CANDIDATE=""
          for p in \
            ./build/rundir/bin/ares \
            ./build/bin/ares \
            ./build/ares
          do
            if [ -x "$p" ]; then
              BIN_CANDIDATE="$p"
              break
            fi
          done

          if [ -z "$BIN_CANDIDATE" ]; then
            BIN_CANDIDATE="$(find build -type f -executable | grep -Ei '(^|/)(ares)$' | head -n 1 || true)"
          fi
          if [ -z "$BIN_CANDIDATE" ]; then
            echo "No ares executable found"
            exit 1
          fi

          echo "ARES_BIN=$BIN_CANDIDATE" >> "$GITHUB_ENV"
          echo "Selected binary: $BIN_CANDIDATE"

      - name: Inspect built binary
        working-directory: ares-src
        run: |
          echo "Using: $ARES_BIN"
          file "$ARES_BIN"
          ldd "$ARES_BIN" | tee ares_ldd_raw.log || true
          echo "---- not found only (raw) ----"
          grep "not found" ares_ldd_raw.log || true

      - name: Prepare portable bundle
        working-directory: ares-src
        run: |
          rm -rf bundle
          mkdir -p bundle/bin
          mkdir -p bundle/share

          cp -a "$ARES_BIN" bundle/bin/ares

          if [ -d build/rundir/share ]; then
            cp -a build/rundir/share/. bundle/share/
          fi

          if [ -f LICENSE ]; then
            cp -a LICENSE bundle/
          fi

          echo "==== bundle tree ===="
          find bundle -maxdepth 6 -type f | sort | sed -n '1,400p'

      - name: Prepare wrapper
        working-directory: ares-src
        run: |
          cat > bundle/run-ares.sh << 'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          HERE="$(cd "$(dirname "$0")" && pwd)"
          exec "$HERE/bin/ares" "$@"
          EOF
          chmod +x bundle/run-ares.sh

      - name: Smoke test help/version
        working-directory: ares-src
        run: |
          bundle/bin/ares --help | sed -n '1,40p' || true
          bundle/bin/ares --version || true

      - name: Upload artifact bundle dir
        uses: actions/upload-artifact@v6
        with:
          name: ares_linux_x86_64_bundle_dir
          path: ares-src/bundle
          if-no-files-found: error

      - name: Pack bundle zip
        working-directory: ares-src
        run: |
          cd bundle
          zip -r ../ares_linux_x86_64_bundle.zip .

      - name: Upload artifact zip
        uses: actions/upload-artifact@v6
        with:
          name: ares_linux_x86_64_bundle_zip
          path: ares-src/ares_linux_x86_64_bundle.zip
          if-no-files-found: error
