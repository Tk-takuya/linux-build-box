name: build-mesen2-linux-native-x64

on:
  workflow_dispatch:

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  MESEN_REPO: https://github.com/SourMesen/Mesen2.git
  MESEN_REF: master

jobs:
  build-linux-native-x64:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - name: Install dependencies
        run: |
          sudo apt-get update -qy
          sudo apt-get install -qy \
            git \
            libsdl2-dev \
            libsdl2-2.0-0 \
            ccache \
            file \
            binutils \
            patchelf \
            zip

      - name: Show tool versions
        run: |
          dotnet --info
          clang --version || true
          gcc --version || true
          ld --version | head -n 1 || true

      - name: Clone Mesen2
        run: |
          rm -rf src/Mesen2
          mkdir -p src
          git clone --depth 1 --branch "${MESEN_REF}" "${MESEN_REPO}" src/Mesen2
          git -C src/Mesen2 rev-parse HEAD | tee src/Mesen2/.built_commit

      - name: Build Mesen2 native (clang)
        working-directory: src/Mesen2
        run: |
          make -j"$(nproc)" -O LTO=true STATICLINK=true SYSTEM_LIBEVDEV=false

      - name: Resolve output path
        run: |
          BIN="src/Mesen2/bin/linux-x64/Release/linux-x64/publish/Mesen"
          test -f "$BIN"
          echo "MESEN_BIN=$BIN" >> "$GITHUB_ENV"
          ls -l "$BIN"

      - name: Collect binary inspection logs
        run: |
          mkdir -p out/logs
          file "$MESEN_BIN" | tee out/logs/file.txt
          ldd "$MESEN_BIN" | tee out/logs/ldd.txt
          readelf -d "$MESEN_BIN" | tee out/logs/readelf-dynamic.txt || true
          strings "$MESEN_BIN" | grep -i hostfxr | tee out/logs/hostfxr-grep.txt || true
          strings "$MESEN_BIN" | grep -i "Microsoft.NET" | tee out/logs/dotnet-grep.txt || true
          sha256sum "$MESEN_BIN" | tee out/logs/sha256.txt

      - name: Create bundle_dir
        run: |
          rm -rf bundle_dir
          mkdir -p bundle_dir
          cp "$MESEN_BIN" bundle_dir/Mesen
          chmod +x bundle_dir/Mesen

          cat > bundle_dir/run-mesen.sh <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          exec "$DIR/Mesen" "$@"
          EOF
          chmod +x bundle_dir/run-mesen.sh

          cp src/Mesen2/.built_commit bundle_dir/MESEN2_COMMIT.txt
          cp out/logs/* bundle_dir/

          cat > bundle_dir/README.txt <<'EOF'
          Mesen2 Linux native x64 build artifact.

          Contents:
          - Mesen
          - run-mesen.sh
          - MESEN2_COMMIT.txt
          - file.txt
          - ldd.txt
          - readelf-dynamic.txt
          - hostfxr-grep.txt
          - dotnet-grep.txt
          - sha256.txt

          Notes:
          - This is the native Linux x64 build path.
          - SDL2 is still expected on the target system.
          - Use ldd.txt to verify runtime-linked libraries.
          - hostfxr-grep.txt / dotnet-grep.txt are included to confirm that the old
            .NET-host style failure path is no longer present.
          EOF

          tar -C bundle_dir -czf mesen2-linux-native-x64-bundle.tar.gz .

      - name: Upload bundle_dir
        uses: actions/upload-artifact@v4
        with:
          name: mesen2-linux-native-x64-bundle_dir
          path: bundle_dir

      - name: Upload tar.gz
        uses: actions/upload-artifact@v4
        with:
          name: mesen2-linux-native-x64-bundle_tgz
          path: mesen2-linux-native-x64-bundle.tar.gz
