name: build-mesen2-linux-native-x64

on:
  workflow_dispatch:

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  MESEN_REPO: https://github.com/SourMesen/Mesen2.git
  MESEN_REF: master

jobs:
  build-linux-native-x64:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - name: Install dependencies
        run: |
          sudo apt-get update -qy
          sudo apt-get install -qy \
            git \
            libsdl2-dev \
            libsdl2-2.0-0 \
            ccache \
            file \
            binutils \
            patchelf \
            zip

      - name: Clone Mesen2
        run: |
          rm -rf src/Mesen2
          mkdir -p src
          git clone --depth 1 --branch "${MESEN_REF}" "${MESEN_REPO}" src/Mesen2
          git -C src/Mesen2 rev-parse HEAD | tee src/Mesen2/.built_commit

      - name: Patch broken publish switch
        working-directory: src/Mesen2
        run: |
          echo "=== before patch ==="
          grep -RIn -- '--no-self-contained true' . || true

          files="$(grep -RIl -- '--no-self-contained true' . || true)"
          if [ -n "$files" ]; then
            while IFS= read -r f; do
              [ -n "$f" ] || continue
              sed -i 's/--no-self-contained true/--self-contained true/g' "$f"
            done <<< "$files"
          fi

          echo "=== after patch ==="
          grep -RIn -- '--no-self-contained true' . || true
          grep -RIn -- '--self-contained true' . || true

      - name: Build Mesen2
        working-directory: src/Mesen2
        run: |
          make -j"$(nproc)" -O LTO=true STATICLINK=true SYSTEM_LIBEVDEV=false

      - name: Resolve output paths
        run: |
          mkdir -p out/logs
          PUBLISH_DIR="src/Mesen2/bin/linux-x64/Release/linux-x64/publish"
          test -d "$PUBLISH_DIR"
          echo "PUBLISH_DIR=$PUBLISH_DIR" >> "$GITHUB_ENV"

          if [ -f "$PUBLISH_DIR/Mesen" ]; then
            echo "MESEN_BIN=$PUBLISH_DIR/Mesen" >> "$GITHUB_ENV"
          else
            echo "Mesen binary not found in expected path"
            find "$PUBLISH_DIR" -maxdepth 3 -type f | sort
            exit 1
          fi

          find "$PUBLISH_DIR" -maxdepth 4 -type f | sort | tee out/logs/publish-filelist.txt

      - name: Collect binary inspection logs
        run: |
          file "$MESEN_BIN" | tee out/logs/file.txt
          ldd "$MESEN_BIN" | tee out/logs/ldd.txt || true
          readelf -d "$MESEN_BIN" | tee out/logs/readelf-dynamic.txt || true
          strings "$MESEN_BIN" | grep -i hostfxr | tee out/logs/hostfxr-grep.txt || true
          strings "$MESEN_BIN" | grep -i "Microsoft.NET" | tee out/logs/dotnet-grep.txt || true
          sha256sum "$MESEN_BIN" | tee out/logs/sha256.txt

      - name: Create bundle_dir
        run: |
          rm -rf bundle_dir
          mkdir -p bundle_dir/lib

          cp "$MESEN_BIN" bundle_dir/Mesen
          chmod +x bundle_dir/Mesen

          # 参考ログ
          cp src/Mesen2/.built_commit bundle_dir/MESEN2_COMMIT.txt
          cp out/logs/* bundle_dir/

          # Publish 配下の重要ネイティブ資産を回収
          find "$PUBLISH_DIR" -type f \( \
            -name 'MesenCore.so' -o \
            -name 'libSkiaSharp.so' -o \
            -name 'libHarfBuzzSharp.so' -o \
            -name 'libAvaloniaNative.so' \
          \) -print | tee bundle_dir/native-assets-found.txt || true

          while IFS= read -r f; do
            [ -n "$f" ] || continue
            cp -f "$f" bundle_dir/lib/
          done < bundle_dir/native-assets-found.txt

          cat > bundle_dir/run-mesen.sh <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          export LD_LIBRARY_PATH="$DIR/lib:${LD_LIBRARY_PATH:-}"
          exec "$DIR/Mesen" "$@"
          EOF
          chmod +x bundle_dir/run-mesen.sh

          cat > bundle_dir/README.txt <<'EOF'
          Mesen2 Linux x64 build artifact.

          Notes:
          - Patched broken publish syntax:
            --no-self-contained true  ->  --self-contained true
          - Use run-mesen.sh to launch.
          - SDL2 is still expected on the target system.
          - See ldd.txt / readelf-dynamic.txt / hostfxr-grep.txt for inspection.
          EOF

          tar -C bundle_dir -czf mesen2-linux-native-x64-bundle.tar.gz .

      - name: Upload bundle_dir
        uses: actions/upload-artifact@v4
        with:
          name: mesen2-linux-native-x64-bundle_dir
          path: bundle_dir

      - name: Upload tar.gz
        uses: actions/upload-artifact@v4
        with:
          name: mesen2-linux-native-x64-bundle_tgz
          path: mesen2-linux-native-x64-bundle.tar.gz
